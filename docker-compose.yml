version: "3.9"

services:
  db:
    image: postgres:16
    container_name: smart-legal-document-manager-db
    environment:
      POSTGRES_DB: smart_legal_document_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_legal_document_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: smart-legal-document-manager-api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app

volumes:
  postgres_data:
